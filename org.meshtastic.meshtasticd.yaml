id: org.meshtastic.meshtasticd
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: meshtasticd-wrapper.sh

finish-args:
  - --share=ipc
  # Allow the app to communicate with the X server
  - --socket=x11
  # Required for CH341 USB radio
  - --device=all
  # Needs network access
  - --share=network
  # Allow bluetooth if available
  - --allow=bluetooth

modules:
  - name: meshtasticd-wrapper
    buildsystem: simple
    build-commands:
      - install -Dm755 meshtasticd-wrapper.sh /app/bin/meshtasticd-wrapper.sh
    sources:
      - type: file
        path: meshtasticd-wrapper.sh
  - name: meshtasticd
    buildsystem: simple
    build-options:
      env:
        # Use the Flatpak lib directory for the build
        PLATFORMIO_BUILD_FLAGS: -L/app/lib
        # Use PlatformIO dependencies from the source bundle
        PLATFORMIO_LIBDEPS_DIR: pio/libdeps
        PLATFORMIO_PACKAGES_DIR: pio/packages
        PLATFORMIO_CORE_DIR: pio/core
        # Prevent PlatformIO from connecting to the internet during the build
        PLATFORMIO_SETTING_ENABLE_TELEMETRY: '0'
        PLATFORMIO_SETTING_CHECK_PLATFORMIO_INTERVAL: '3650'
        PLATFORMIO_SETTING_CHECK_PRUNE_SYSTEM_THRESHOLD: '10240'
    build-commands:
      # Install desktop metadata
      - install -Dm644 -t /app/share/icons/hicolor/scalable/apps bin/org.meshtastic.meshtasticd.svg
      - install -Dm644 -t /app/share/applications bin/org.meshtastic.meshtasticd.desktop
      - desktop-file-edit --set-key="Exec" --set-value="meshtasticd-wrapper.sh %U"
        /app/share/applications/org.meshtastic.meshtasticd.desktop
      - install -Dm644 -t /app/share/metainfo bin/org.meshtastic.meshtasticd.metainfo.xml
      # Set platformio cache to always expire in the future (append '1' to timestamps)
      - >
        tj=$(mktemp) &&
        jq -c 'with_entries(.value |= (. | tostring + "1" | tonumber))' pio/core/.cache/downloads/usage.db
        > "$tj" &&
        mv "$tj" pio/core/.cache/downloads/usage.db
      # Build meshtasticd
      - platformio run -e native-tft --disable-auto-clean
      - install -Dm755 .pio/build/native-tft/program /app/bin/meshtasticd
      # Install the default config files and directories
      - install -d /app/share/meshtasticd
      - install -d /app/share/meshtasticd/config.d
      - install -d /app/share/meshtasticd/available.d
      - cp -R bin/config.d/* /app/share/meshtasticd/available.d
      - install -m644 bin/config-dist.yaml /app/share/meshtasticd/config-dist.yaml
      # Install the default maps
      - install -d /app/share/meshtasticd/maps
      - for file in pio/libdeps/native-tft/meshtastic-device-ui/maps/*.zip; do bsdtar
        -xf "$file" --no-same-owner --strip-components=1 -C /app/share/meshtasticd/maps;
        done
    sources:
      - type: git
        url: https://github.com/meshtastic/firmware.git
        tag: v2.7.15.567b8ea
        commit: d18f3f7a658817b35a3ab746d8522c1136890785
        x-checker-data:
          is-main-source: true
          type: json
          url: https://api.github.com/repos/meshtastic/firmware/releases/latest
          timestamp-query: .published_at
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
      - type: patch
        paths:
          - patches/stdcppfs.patch
      - type: archive
        url: https://github.com/meshtastic/firmware/releases/download/v2.7.15.567b8ea/platformio-deps-native-tft-2.7.15.567b8ea.zip
        sha256: fd3627f7d2e8efbe1e97056b94df1df72caad5b8983e059667d04a55147ae903
        strip-components: 1
        dest: pio
        x-checker-data:
          is-main-source: true
          type: json
          url: https://api.github.com/repos/meshtastic/firmware/releases/latest
          timestamp-query: .published_at
          version-query: .tag_name | sub("^v"; "")
          url-query: |-
            .assets[] | select(.name=="platformio-deps-native-tft-" + $version + ".zip") | .browser_download_url
    cleanup:
      - /include
      - /lib/pkgconfig
      - /lib/cmake
      - /lib/*.a
      - /share/man
    modules:
      - python3-requirements.yaml
      - name: yaml-cpp
        buildsystem: cmake-ninja
        config-opts:
          - -DBUILD_SHARED_LIBS=ON
          - -DYAML_BUILD_SHARED_LIBS=ON
          - -DYAML_CPP_BUILD_TOOLS=OFF
          - -DYAML_CPP_BUILD_TESTS=OFF
          - -DYAML_CPP_BUILD_CONTRIB=OFF
        sources:
          - type: archive
            url: https://github.com/jbeder/yaml-cpp/archive/refs/tags/yaml-cpp-0.9.0.tar.gz
            sha256: 25cb043240f828a8c51beb830569634bc7ac603978e0f69d6b63558dadefd49a
            x-checker-data:
              type: anitya
              project-id: 5284
              stable-only: true
              url-template: https://github.com/jbeder/yaml-cpp/archive/refs/tags/yaml-cpp-$version.tar.gz
      - name: libgpiod
        buildsystem: autotools
        sources:
          - type: archive
            url: https://git.kernel.org/pub/scm/libs/libgpiod/libgpiod.git/snapshot/libgpiod-2.2.3.tar.gz
            sha256: a748aac65c589f4f465763704b07a7bf3b598d3a810659275956b461bf795b7a
            x-checker-data:
              type: anitya
              project-id: 20640
              stable-only: true
              url-template: https://git.kernel.org/pub/scm/libs/libgpiod/libgpiod.git/snapshot/libgpiod-$version.tar.gz
      - name: i2c-tools
        buildsystem: simple
        build-commands:
          - make PREFIX=${FLATPAK_DEST} install
        sources:
          - type: archive
            url: https://git.kernel.org/pub/scm/utils/i2c-tools/i2c-tools.git/snapshot/i2c-tools-4.4.tar.gz
            sha256: af01d0fbe78e109a2db7137c7e9bfda3f3fb236c3177744c0f2695d1056cde71
            x-checker-data:
              type: anitya
              project-id: 9272
              stable-only: true
              url-template: https://git.kernel.org/pub/scm/utils/i2c-tools/i2c-tools.git/snapshot/i2c-tools-$version.tar.gz
      - name: libuv
        buildsystem: cmake-ninja
        config-opts:
          - -DCMAKE_BUILD_TYPE=Release
        sources:
          - type: git
            url: https://github.com/libuv/libuv/
            tag: v1.52.1
            commit: 1cfa32ff59c076ffb6ed735bbc8c18361558661f
            x-checker-data:
              type: anitya
              project-id: 10784
              stable-only: true
              tag-template: v${version}
        cleanup:
          - /bin
      - name: libevdev
        buildsystem: meson
        config-opts:
          - -Dtests=disabled
          - -Ddocumentation=disabled
        sources:
          - type: archive
            url: https://www.freedesktop.org/software/libevdev/libevdev-1.13.6.tar.xz
            sha256: 73f215eccbd8233f414737ac06bca2687e67c44b97d2d7576091aa9718551110
            x-checker-data:
              type: anitya
              project-id: 20540
              stable-only: true
              url-template: https://www.freedesktop.org/software/libevdev/libevdev-$version.tar.xz
        cleanup:
          - /bin
      - name: libinput
        buildsystem: meson
        config-opts:
          - --libexec=lib
          - -Dlibwacom=false
          - -Ddebug-gui=false
          - -Dtests=false
          - -Ddocumentation=false
          - -Dzshcompletiondir=no
        sources:
          - type: archive
            url: https://gitlab.freedesktop.org/libinput/libinput/-/archive/1.31.0/libinput-1.31.0.tar.gz
            sha256: 5f95a8ce039b3b2b4560a60bbdb920518d41baa9419344e5878c94bd841d5a54
            x-checker-data:
              type: anitya
              project-id: 5781
              stable-only: true
              url-template: https://gitlab.freedesktop.org/libinput/libinput/-/archive/$version/libinput-$version.tar.gz
        cleanup:
          - /bin
          - /etc
          - /lib/libinput
          - /lib/udev
          - /share
        modules:
          - name: mtdev
            buildsystem: autotools
            config-opts:
              - --disable-static
            sources:
              - type: archive
                url: https://bitmath.org/code/mtdev/mtdev-1.1.7.tar.bz2
                mirror-urls:
                  - https://ftp.osuosl.org/pub/blfs/conglomeration/mtdev/mtdev-1.1.7.tar.bz2
                  - https://mirror.freedif.org/pub/blfs/conglomeration/mtdev/mtdev-1.1.7.tar.bz2
                sha256: a107adad2101fecac54ac7f9f0e0a0dd155d954193da55c2340c97f2ff1d814e
                x-checker-data:
                  type: anitya
                  project-id: 8868
                  stable-only: true
                  url-template: https://bitmath.org/code/mtdev/mtdev-$version.tar.bz2
              # Upstream uses an outdated version of the config.guess/config.sub script,
              # so we override it here to fix aarch64 builds.
              - type: shell
                commands:
                  - cp -p /usr/share/automake-*/config.{sub,guess} config-aux/
            cleanup:
              - /bin
              - /lib/*.la
      - name: xkbcommon
        buildsystem: meson
        config-opts:
          - --buildtype=release
          - -Ddefault_library=static
          - -Denable-docs=false
          - -Denable-tools=false
          - -Denable-bash-completion=false
          - -Dx-locale-root=/usr/share/X11/locale
        cleanup:
          - /bin
          - /libexec
        sources:
          - type: archive
            url: https://xkbcommon.org/download/libxkbcommon-1.7.0.tar.xz
            sha256: 65782f0a10a4b455af9c6baab7040e2f537520caa2ec2092805cdfd36863b247
            x-checker-data:
              type: anitya
              project-id: 1780
              stable-only: true
              url-template: https://xkbcommon.org/download/libxkbcommon-$version.tar.xz
